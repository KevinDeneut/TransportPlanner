services:
  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: transport
      POSTGRES_PASSWORD: transport
      POSTGRES_DB: transport_planner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transport -d transport_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://transport:transport@db:5432/transport_planner
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 8h
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      SAP_ADAPTER: mock
    ports:
      - "3000:3000"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/packages/backend/node_modules

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/packages/frontend/node_modules

volumes:
  postgres_data:
